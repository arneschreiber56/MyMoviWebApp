{% extends "base.html" %}

{% block content %}

  <h1>Users</h1>

  {% if users %}
    <ul>
      {% for user in users %}
        <li>
          <a href="{{ url_for('movies_handler_user', user_id=user.id) }}">
            {{ user.name }}
          </a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>No users yet. Add your first user 👇</p>
  {% endif %}
  <div class="form-section">
    <h2>Add New User</h2>
    <form action="/users" method="post">
      <input type="text" id="name" name="name" placeholder="User Name" required>
      <button type="submit" class="btn-add">Add User</button>
    </form>

  </div>

{% endblock %}
