{% extends "base.html" %}

{% block content %}

<div class="users_page">
  <h1>Users</h1>

  {% if users %}
    <ul class="user-list">
      {% for user in users %}
        <li class="user-row">

          <div class="user-name">
            {{ user.name }}
          </div>

          <div class="user-actions">
            <a
              href="{{ url_for('movies_handler_user', user_id=user.id) }}"
              class="btn btn-info"
            >
              View Movies
            </a>
          </div>

        </li>
      {% endfor %}
    </ul>

  {% else %}
    <div class="empty">
      <h2>No users yet 👤</h2>
      <p>Add your first user below.</p>
    </div>
  {% endif %}

  <!-- ADD USER -->
  <div class="form-section">
    <h2>Add New User</h2>

    <form action="{{ url_for('create_user') }}" method="post">
      <input
        type="text"
        name="name"
        placeholder="User name"
        required
      >

      <button type="submit" class="btn-add">
        Add User
      </button>
    </form>
  </div>
</div>
{% endblock %}
